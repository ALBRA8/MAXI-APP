<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <style>

        }
        .container { 
            background: white;

            border-radius: 12px; 
            display: inline-block;

        }
        h1 { color: #0066ff; margin-bottom: 10px; font-size: 28px; }
        p { line-height: 1.6; color: #4b4b4b; }
        .status { 
            display: inline-block; 
            background: #e7f3ff; 
            color: #1877f2; 
            padding: 5px 15px; 
            border-radius: 20px; 
            font-weight: bold; 
            font-size: 0.9em;
            margin-top: 15px;
        }
        .footer { 
            margin-top: 30px; 
            font-size: 0.85em; 
            color: #90949c; 
            border-top: 1px solid #ebedf0;
            padding-top: 20px;
        }
        a { color: #0066ff; text-decoration: none; }
        a:hover { text-decoration: underline; }
